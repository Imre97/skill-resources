services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_PATH: /data/app.db
    volumes:
      - db_data:/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
